services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  namesrv:
    image: apache/rocketmq:4.9.7
    container_name: rocketmq-namesrv
    command: sh /home/rocketmq/rocketmq-4.9.7/bin/mqnamesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-XX:-UseContainerSupport"

  broker:
    image: apache/rocketmq:4.9.7
    container_name: rocketmq-broker
    depends_on:
      - namesrv
    command: sh /home/rocketmq/rocketmq-4.9.7/bin/mqbroker -n namesrv:9876
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      NAMESRV_ADDR: namesrv:9876
      JAVA_OPT_EXT: "-XX:-UseContainerSupport"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports-betting-service
    depends_on:
      - kafka
      - namesrv
      - broker
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ROCKETMQ_NAME_SERVER: namesrv:9876
    restart: on-failure
